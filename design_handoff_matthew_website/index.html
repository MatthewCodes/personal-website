<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matthew Rhodes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --background: hsl(201, 100%, 13%);
      --foreground: hsl(0, 0%, 100%);
      --muted-foreground: hsl(240, 4%, 66%);
      --primary: hsl(0, 0%, 100%);
      --primary-foreground: hsl(0, 0%, 4%);
      --secondary: hsl(0, 0%, 10%);
      --muted: hsl(0, 0%, 10%);
      --accent: hsl(0, 0%, 10%);
      --border: hsl(0, 0%, 18%);
      --input: hsl(0, 0%, 18%);
      --font-display: 'Instrument Serif', serif;
      --font-body: 'Inter', sans-serif;
    }

    html, body {
      height: 100%;
      background-color: var(--background);
      color: var(--foreground);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* VIDEO PLACEHOLDER */
    .video-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      background: var(--background);
    }

    /* LIQUID GLASS */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ANIMATIONS */
    @keyframes fade-rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-rise         { animation: fade-rise 0.8s ease-out 0s   both; }
    .animate-fade-rise-delay   { animation: fade-rise 0.8s ease-out 0.2s both; }
    .animate-fade-rise-delay-2 { animation: fade-rise 0.8s ease-out 0.4s both; }

    /* PAGE SHELL */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      position: relative;
      z-index: 10;
    }
    .nav-inner {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 24px 32px;
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.875rem;
      letter-spacing: -0.03em;
      color: var(--foreground);
      line-height: 1;
      font-weight: 400;
    }
    .logo sup {
      font-size: 0.75rem;
      vertical-align: super;
    }
    .nav-links {
      display: none;
      gap: 32px;
      list-style: none;
    }
    @media (min-width: 768px) {
      .nav-links { display: flex; }
    }
    .nav-links a {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--foreground); }
    .nav-cta {
      font-family: var(--font-body);
      font-size: 0.875rem;
      color: var(--foreground);
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 9999px;
      padding: 10px 24px;
      transition: transform 0.2s ease;
      letter-spacing: 0.01em;
    }
    .nav-cta:hover { transform: scale(1.03); }

    /* HERO */
    .hero {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 90px 24px;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.95;
      letter-spacing: -0.061em;
      max-width: 1280px;
      color: var(--foreground);
      text-wrap: balance;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--muted-foreground);
    }
    .hero p {
      color: var(--muted-foreground);
      font-size: clamp(1rem, 1.5vw, 1.125rem);
      max-width: 42rem;
      margin-top: 32px;
      line-height: 1.7;
      font-weight: 400;
    }
    .hero-cta {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--foreground);
      background: none;
      border: none;
      cursor: pointer;
      border-radius: 9999px;
      padding: 20px 56px;
      margin-top: 48px;
      transition: transform 0.2s ease;
      letter-spacing: 0.01em;
    }
    .hero-cta:hover { transform: scale(1.03); }

    /* ── INTRO VIDEO MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-inner {
      position: relative;
      width: 90vw;
      max-width: 960px;
      aspect-ratio: 16/9;
      border-radius: 4px;
      overflow: hidden;
      transform: scale(0.95);
      transition: transform 0.3s ease;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
    }
    .modal-overlay.open .modal-inner {
      transform: scale(1);
    }
    .modal-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }
    .modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 10;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.2); }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
    // ── MODAL LOGIC ──
    const modal      = document.getElementById('intro-modal');
    const introVideo = document.getElementById('intro-video');
    const closeBtn   = document.getElementById('modal-close');

    function openModal() {
      modal.classList.add('open');
      introVideo.play().catch(() => {});
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      modal.classList.remove('open');
      introVideo.pause();
      introVideo.currentTime = 0;
      document.body.style.overflow = '';
    }

    // Wire up both "Intro Video" buttons
    document.querySelectorAll('.intro-video-btn').forEach(btn => {
      btn.addEventListener('click', openModal);
    });

    closeBtn.addEventListener('click', closeModal);

    // Close on backdrop click
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // Close on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
    }); // end DOMContentLoaded
  </script>
</head>
<body>

  <!-- ============================================================
       BACKGROUND VIDEO
       Claude Code: add your background video file to the project,
       then set the src below. Recommended: videos/background.mp4
       ============================================================ -->
  <video class="video-bg" id="video-bg" autoplay muted loop playsinline>
    <source src="videos/background.mp4" type="video/mp4">
  </video>

  <!-- ============================================================
       INTRO VIDEO MODAL
       Claude Code: add your intro video file to the project,
       then set the src on the <source> tag below.
       Recommended: videos/intro.mp4
       ============================================================ -->
  <div class="modal-overlay" id="intro-modal" role="dialog" aria-modal="true" aria-label="Intro Video">
    <div class="modal-inner">
      <button class="modal-close" id="modal-close" aria-label="Close video">✕</button>
      <video class="modal-video" id="intro-video" controls playsinline>
        <source src="videos/intro.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div class="page">
    <nav>
      <div class="nav-inner">
        <span class="logo">Matthew</span>
        <ul class="nav-links">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="blogs.html">Blogs</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="https://github.com/MatthewCodes" target="_blank">Github</a></li>
        </ul>
        <a href="resume.html" class="nav-cta liquid-glass" style="text-decoration: none; display: inline-block;">Resume</a>
      </div>
    </nav>

    <section class="hero">
      <h1 class="animate-fade-rise">
        Agent Engineer &amp; Data Scientist
      </h1>
      <button class="hero-cta liquid-glass animate-fade-rise-delay intro-video-btn">
        Intro Video
      </button>
    </section>
  </div>

</body>
</html>
